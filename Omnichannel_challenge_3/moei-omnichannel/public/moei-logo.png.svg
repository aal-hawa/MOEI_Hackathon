<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 50" width="160" height="50">
  <!-- MOEI English Logo -->
  <g transform="translate(0,0)">
    <!-- UAE Flag Colors Bar -->
    <rect x="0" y="0" width="5" height="50" fill="#00843D" rx="2"/>
    <rect x="0" y="0" width="5" height="17" fill="#CE1126" rx="2"/>
    
    <!-- MOEI Text -->
    <text x="12" y="18" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a1a" letter-spacing="1">
      MOEI
    </text>
    
    <!-- Subtitle -->
    <text x="12" y="34" font-family="Arial, sans-serif" font-size="7" fill="#555">
      Ministry of Energy
    </text>
    <text x="12" y="44" font-family="Arial, sans-serif" font-size="7" fill="#555">
      &amp; Infrastructure
    </text>
  </g>
</svg>
