<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" width="120" height="140">
  <!-- UAE Government 5-Star Rating Logo -->
  <!-- Gold star wreath -->
  <g transform="translate(60,70)">
    <!-- Outer wreath circle -->
    <ellipse cx="0" cy="0" rx="52" ry="52" fill="none" stroke="#C5A55A" stroke-width="3"/>
    <!-- 5 Stars -->
    <g fill="#C5A55A">
      <!-- Top star -->
      <polygon points="0,-48 3,-38 13,-38 5,-32 8,-22 0,-28 -8,-22 -5,-32 -13,-38 -3,-38" />
      <!-- Top-right star -->
      <polygon points="46,-15 48,-5 57,-2 49,4 50,14 42,9 34,14 35,4 27,-2 36,-5" />
      <!-- Bottom-right star -->
      <polygon points="28,40 32,49 41,50 34,56 36,65 28,61 20,65 22,56 15,50 24,49" />
      <!-- Bottom-left star -->
      <polygon points="-28,40 -24,49 -15,50 -22,56 -20,65 -28,61 -36,65 -34,56 -41,50 -32,49" />
      <!-- Top-left star -->
      <polygon points="-46,-15 -48,-5 -57,-2 -49,4 -50,14 -42,9 -34,14 -35,4 -27,-2 -36,-5" />
    </g>
    <!-- Center text -->
    <text x="0" y="-8" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1a1a1a">UAE</text>
    <text x="0" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#555">GOVERNMENT</text>
    <text x="0" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#888">5-STAR RATING</text>
  </g>
</svg>
